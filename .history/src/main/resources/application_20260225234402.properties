spring.application.name=spring_app

# --- Configuration PostgreSQL ---
spring.datasource.url=jdbc:postgresql://localhost:5433/spring_db
spring.datasource.username=admin
spring.datasource.password=password123
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Configuration JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# MODIFICATION ICI : 'update' au lieu de 'create' pour ne pas perdre vos données 
# (utilisateurs, événements, etc.) à chaque fois que vous relancez l'application.
spring.jpa.hibernate.ddl-auto=update

# Affiche les requêtes SQL dans la console (très pratique pour le debug)
spring.jpa.show-sql=true

# Désactiver le warning "Open Session In View" (Excellente pratique)
spring.jpa.open-in-view=false

#Stripe configuration
stripe.api.key = 